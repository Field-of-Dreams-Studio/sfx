-[ template "/base/base.html" ]-

-[ block body ]-

-[ insert "/base/path.html" ]-

<div class="container-func">
    <h2>Manage Users</h2>
    <form id="userForm" method="POST" action="/admin/users">
        <div class="mb-3">
            <label for="newUsername" class="form-label">Username</label>
            <input id="newUsername" type="text" name="username" class="form-control" required />
        </div>
        <div class="mb-3">
            <label for="newEmail" class="form-label">Email</label>
            <input id="newEmail" type="email" name="email" class="form-control" required />
        </div>
        <div class="mb-3">
            <label for="newPassword" class="form-label">Password</label>
            <input id="newPassword" type="password" name="password" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-pink">Add User</button>
    </form>
    <hr/>
    <h3>Existing Users</h3>
    <!--
        Filter form removed in 0.1.3 (the prior version's
        action="/panel/users" target was a dead route, and none of the
        fields were honored by the JSON endpoint). Re-introducing filters
        requires LOCAL_AUTH.list_users to accept predicate parameters;
        tracked as a follow-up in TICKETS.md.
    -->
    <table class="table">
        <thead>
            <tr>
                <th>UID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Active</th>
                <th>Superuser</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="usersTableBody">
        </tbody>
    </table>
    <div class="mt-3">
      <nav>
        <ul class="pagination">
          <li class="page-item" id="prevPageItem">
            <a id="prevPage" class="page-link" href="#">Previous</a>
          </li>
          <li class="page-item disabled">
            <span class="page-link">Page <span id="currentPage">1</span></span>
          </li>
          <li class="page-item" id="nextPageItem">
            <a id="nextPage" class="page-link" href="#">Next</a>
          </li>
        </ul>
      </nav>
    </div>
    <script>
    // HTML-escape interpolated user data to neutralize XSS payloads in
    // usernames, emails, etc. (Bug 6a). Falls back to '' for null/undefined.
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));

    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const page = parseInt(urlParams.get('page')) || 1;
        const PER_PAGE = 10;
        let res;
        try {
            res = await fetch('/panel/users/json' + window.location.search);
        } catch (e) {
            console.error('Fetch to /panel/users/json failed:', e);
            return;
        }
        let text;
        try {
            text = await res.text();
        } catch (e) {
            console.error('Failed to read response text:', e);
            return;
        }
        let data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            console.error('Invalid JSON from /panel/users/json:', text, e);
            return;
        }
        const users = Array.isArray(data.users) ? data.users : [];
        const total = typeof data.total === 'number' ? data.total : users.length;
        const tbody = document.getElementById('usersTableBody');
        // Backend currently returns the full user list — slice client-side.
        // Backend-side pagination tracked as a follow-up in TICKETS.md.
        const startIndex = (page - 1) * PER_PAGE;
        const pageUsers = users.slice(startIndex, startIndex + PER_PAGE);
        let html = '';
        for (const user of pageUsers) {
            const uid = user.uid ?? '';
            html += '<tr>' +
                    '<td>' + esc(uid) + '</td>' +
                    '<td>' + esc(user.username) + '</td>' +
                    '<td>' + esc(user.email) + '</td>' +
                    '<td>' + esc(user.is_active) + '</td>' +
                    '<td>' + esc(user.is_superuser) + '</td>' +
                    '<td><a href="/panel/users/' + encodeURIComponent(uid) + '">Edit</a></td>' +
                '</tr>';
        }
        tbody.innerHTML = html;
        document.getElementById('currentPage').textContent = page;
        const prevPage = document.getElementById('prevPage');
        const nextPage = document.getElementById('nextPage');
        const prevItem = document.getElementById('prevPageItem');
        const nextItem = document.getElementById('nextPageItem');
        if (page > 1) {
            prevPage.href = window.location.pathname + '?page=' + (page - 1);
            prevItem.classList.remove('disabled');
        } else {
            prevItem.classList.add('disabled');
            prevPage.removeAttribute('href');
        }
        if (startIndex + PER_PAGE < total) {
            nextPage.href = window.location.pathname + '?page=' + (page + 1);
            nextItem.classList.remove('disabled');
        } else {
            nextItem.classList.add('disabled');
            nextPage.removeAttribute('href');
        }
    });
    </script>
</div>
-[ endblock ]-
