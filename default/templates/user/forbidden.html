-[ template "/base/base.html" ]-

-[ block body ]-

<div class="row justify-content-center" style="padding-top: 50px; padding-bottom: 30px;">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-body text-center">
                <h1 class="mb-3">403 — Forbidden</h1>
                <p class="mb-4">-[ message ]-</p>
                <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                    <a href="/user/login?next=-[ next ]-" class="btn btn-pink">Log in</a>
                    <a href="-[ pageprop["path"] ]-" class="btn btn-secondary">Back to view</a>
                </div>
            </div>
        </div>
    </div>
</div>

-[ endblock ]-
